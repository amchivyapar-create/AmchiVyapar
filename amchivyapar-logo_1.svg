<svg viewBox="0 0 480 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@600&amp;family=IBM+Plex+Mono:wght@500&amp;display=swap');
      .wordmark { font-family:'Fraunces', Georgia, serif; font-weight:600; font-size:40px; }
      .tagline { font-family:'IBM Plex Mono', monospace; font-weight:500; font-size:11px; letter-spacing:2px; }
    </style>
  </defs>

  <!-- Icon mark: AV monogram -->
  <g transform="translate(0,0)">
    <circle cx="55" cy="60" r="52" fill="#FAF6EC" stroke="#1B4B43" stroke-width="2.5"/>
    <g fill="none" stroke="#1B4B43" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M55,33 L28,87"/>
      <path d="M55,33 L82,87"/>
      <path d="M40,62 L70,62"/>
    </g>
    <g fill="none" stroke="#C9952C" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M40,62 L55,87"/>
      <path d="M70,62 L55,87"/>
    </g>
    <circle cx="55" cy="28" r="4" fill="#C9952C"/>
  </g>

  <!-- Wordmark, unchanged: exactly as it appears in the site's top bar -->
  <text x="128" y="68" class="wordmark">
    <tspan fill="#241F1A">Amchi</tspan><tspan fill="#C9952C">Vyapar</tspan>
  </text>

  <!-- Tagline -->
  <text x="130" y="90" class="tagline" fill="#1B4B43">GSB BUSINESS DIRECTORY</text>
</svg>
